<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Forum</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="static/styles.css">
  <link rel="icon" href="static/favicon.ico" sizes="any">
</head>
<body>
<nav class="navbar navbar-expand-sm">
  <div class="container">
    <a class="navbar-brand text-center" href="/">
      <img src="static/favicon.ico" width="30" height="30" alt="Logo" class="d-inline-block align-text-top">
      Forum
    </a>
    <ul class="navbar-nav list-group list-group-horizontal">
      <li class="nav-item list-group-item {{ 'active' if request.path == '/' else '' }}">
        <a class="nav-link" href="/">
          <img src="static/home.png" width="30" height="30" alt="Home" class="d-inline-block align-text-top">
        </a>
      </li>
      <li class="nav-item list-group-item {{ 'active' if request.path == '/login' else '' }}">
        <a class="nav-link" href="/login">Login</a>
      </li>
      <li class="nav-item list-group-item {{ 'active' if request.path == '/register' else '' }}">
        <a class="nav-link" href="/register">Register</a>
      </li>
    </ul>
  </div>
</nav>
<hr class="w-75 col-sm-4"></hr>
{% block content %}
{% endblock %}
</body>
</html>
